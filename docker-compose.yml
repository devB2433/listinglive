
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: listinglive
      POSTGRES_PASSWORD: listinglive
      POSTGRES_DB: listinglive
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listinglive"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://listinglive:listinglive@postgres:5432/listinglive
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.tasks.celery_app worker -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://listinglive:listinglive@postgres:5432/listinglive
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.tasks.celery_app beat -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://listinglive:listinglive@postgres:5432/listinglive
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api

volumes:
  pgdata:
