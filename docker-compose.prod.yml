services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      TZ: ${CONTAINER_TIMEZONE:-UTC}
    depends_on:
      - frontend
      - api
    ports:
      - "${PROXY_PORT:-3001}:80"
    volumes:
      - ./deploy/nginx/listinglive.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${CONTAINER_TIMEZONE:-UTC}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      TZ: ${CONTAINER_TIMEZONE:-UTC}
      POSTGRES_USER: ${POSTGRES_USER:-listinglive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-listinglive}
      POSTGRES_DB: ${POSTGRES_DB:-listinglive}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - listinglive_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-listinglive} -d ${POSTGRES_DB:-listinglive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      TZ: ${CONTAINER_TIMEZONE:-UTC}
    command: redis-server --save 60 1000 --appendonly no
    volumes:
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-/opt/listinglive/config/.env.prod}
    environment:
      TZ: ${CONTAINER_TIMEZONE:-UTC}
      STORAGE_LOCAL_ROOT: /data/storage
      AI_PROVIDER_CONFIG_PATH: /run/listinglive/ai_provider.toml
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APP_STORAGE_ROOT:-/opt/listinglive/data/storage}:/data/storage
      - ${AI_PROVIDER_TOML_PATH:-/opt/listinglive/config/ai_provider.toml}:/run/listinglive/ai_provider.toml:ro
      - ${APP_CONFIG_ROOT:-/opt/listinglive/config}:/run/listinglive/config:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-/opt/listinglive/config/.env.prod}
    environment:
      TZ: ${CONTAINER_TIMEZONE:-UTC}
      STORAGE_LOCAL_ROOT: /data/storage
      AI_PROVIDER_CONFIG_PATH: /run/listinglive/ai_provider.toml
    command: celery -A backend.tasks.celery_app worker -l info -Q celery,video-standard,video-flex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APP_STORAGE_ROOT:-/opt/listinglive/data/storage}:/data/storage
      - ${AI_PROVIDER_TOML_PATH:-/opt/listinglive/config/ai_provider.toml}:/run/listinglive/ai_provider.toml:ro

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-/opt/listinglive/config/.env.prod}
    environment:
      TZ: ${CONTAINER_TIMEZONE:-UTC}
      STORAGE_LOCAL_ROOT: /data/storage
      AI_PROVIDER_CONFIG_PATH: /run/listinglive/ai_provider.toml
    command: celery -A backend.tasks.celery_app beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APP_STORAGE_ROOT:-/opt/listinglive/data/storage}:/data/storage
      - ${AI_PROVIDER_TOML_PATH:-/opt/listinglive/config/ai_provider.toml}:/run/listinglive/ai_provider.toml:ro

volumes:
  listinglive_pgdata:
